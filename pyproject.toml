[project]
name = "kdt-ai-2-hands-on-experience"
version = "0.1.0"
description = "AI Financial Copilot Sandbox monorepo"
requires-python = ">=3.12,<3.13"
dependencies = [
    "agent",
    "backend",
]

[tool.uv]
package = false

[tool.uv.workspace]
members = [
    "agent",
    "backend",
]

[tool.uv.sources]
agent = { workspace = true }
backend = { workspace = true }

[dependency-groups]
dev = [
    "pre-commit>=4.0.0",
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "python-dotenv>=1.0.0",
    "ruff>=0.8.0",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
python_files = "test_*.py"
addopts = "-v --durations=10"
