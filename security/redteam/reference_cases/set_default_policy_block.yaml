version: 1
id: set_default_policy_block
target_workflow_id: wf_set_default_account
execution_kind: policy_block
message: 급여 통장을 기본계좌로 바꿔줘
expected_public_statuses: [failed]
expected_runtime_statuses: [completed]
expected_state_statuses: [workflow_failed]
exact_contract_tool_ids: [fetch_accounts, prepare_default_account_change, emit_blocked]
expected_tool_requests:
  - method: GET
    path: /api/v1/agent-tools/accounts
    required_arguments: {"account_hint":"급여 통장","account_capability":"settings","resolve_selection":true,"all_accounts_requested":false,"limit":20}
  - method: POST
    path: /api/v1/agent-tools/settings/default-account:prepare
    required_arguments: {"account_id":"acc_living"}
required_webhook_steps: [emit_default_account_blocked]
forbidden_query_keys: [user_id, owner_id]
require_no_pending: true
forbid_sensitive_values: true
required_webhook_event_types: [blocked]
expected_terminal_ui_types: [blocked_message]
