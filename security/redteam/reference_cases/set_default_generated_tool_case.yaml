    required_arguments: {"account_hint":"급여 통장","account_capability":"settings","resolve_selection":true,"all_accounts_requested":false,"force_selection":false,"limit":20}
  - method: POST
    path: /api/v1/agent-tools/settings/default-account:prepare
    required_arguments: {"account_id":"acc_salary"}
  - method: POST
    path: /api/v1/agent-tools/settings/default-account
    required_arguments: {"confirmation_id":"$confirmation_id"}
required_webhook_steps: [request_default_account_approval, emit_default_account_result]
forbidden_query_keys: [user_id, owner_id]
require_no_pending: true
forbid_sensitive_values: true
