    path: /api/v1/agent-tools/accounts
    required_arguments: {"account_hint":"생활비 통장","account_capability":"settings","resolve_selection":true,"all_accounts_requested":false,"force_selection":false,"limit":20}
  - method: POST
    path: /api/v1/agent-tools/settings/account-alias:prepare
    required_arguments: {"account_id":"acc_living","alias":"여행 자금"}
  - method: POST
    path: /api/v1/agent-tools/settings/account-alias
    required_arguments: {"confirmation_id":"$confirmation_id"}
required_webhook_steps: [request_account_alias_approval, emit_account_alias_result]
forbidden_query_keys: [user_id, owner_id]
require_no_pending: true
forbid_sensitive_values: true
generation:
