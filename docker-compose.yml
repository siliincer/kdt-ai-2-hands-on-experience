services:
  postgres:
    image: postgres:16-alpine
    container_name: kdt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_agent}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-local}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-financial_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kdt-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kdt-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      default:
        aliases:
          - backend-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: kdt-agent
    env_file:
      - .env
    environment:
      # compose 스택에서는 실제 서비스 간 통신을 검증하도록 http 모드
      BANK_CLIENT: http
    ports:
      - "8001:8001"
    networks:
      default:
        aliases:
          - agent-service
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      mock-financial-service:
        condition: service_started

  mock-financial-service:
    build:
      context: .
      dockerfile: mock-financial-service/Dockerfile
    container_name: kdt-mock-financial-service
    env_file:
      - .env
    ports:
      - "8002:8002"
    networks:
      default:
        aliases:
          - mock-financial-service

  nginx:
    image: nginx:1.27-alpine
    container_name: kdt-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - agent

volumes:
  postgres-data:
