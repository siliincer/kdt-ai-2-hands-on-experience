services:
  postgres:
    image: postgres:16-alpine
    container_name: kdt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_agent}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-local}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-financial_agent}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kdt-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kdt-backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://app:change-me-in-local@postgres:5432/financial_agent}
      REDIS_CACHE_URL: ${COMPOSE_REDIS_CACHE_URL:-redis://redis:6379/0}
      REDIS_STREAM_URL: ${COMPOSE_REDIS_STREAM_URL:-redis://redis:6379/1}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-local}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      SSE_TICKET_TTL_SECONDS: ${SSE_TICKET_TTL_SECONDS:-120}
      AGENT_STREAM_BLOCK_MS: ${AGENT_STREAM_BLOCK_MS:-15000}
      AGENT_STREAM_MAXLEN: ${AGENT_STREAM_MAXLEN:-1000}
      AGENT_STREAM_TTL_SECONDS: ${AGENT_STREAM_TTL_SECONDS:-3600}
      AGENT_WEBHOOK_SECRET: ${AGENT_WEBHOOK_SECRET:-change-me-agent-webhook}
      SSE_TICKET_RATE_LIMIT: ${SSE_TICKET_RATE_LIMIT:-30/minute}
      SSE_CONNECT_RATE_LIMIT: ${SSE_CONNECT_RATE_LIMIT:-60/minute}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      default:
        aliases:
          - backend-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agent:
    profiles: ["agent"]
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: kdt-agent
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      BANK_CLIENT: ${BANK_CLIENT:-local}
      MOCK_FINANCIAL_SERVICE_URL: ${MOCK_FINANCIAL_SERVICE_URL:-}
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      default:
        aliases:
          - agent-service
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: kdt-nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
