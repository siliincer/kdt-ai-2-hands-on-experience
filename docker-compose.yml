# prod 배포 전 로컬 최종 테스트용 컨테이너 설정 모음 (연습용?)
# 실행 방법: docker compose -f docker-compose.yml up --build -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: kdt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_agent}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-local}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-financial_agent}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:7-alpine
    container_name: kdt-redis-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_stream:
    image: redis:7-alpine
    container_name: kdt-redis-stream
    ports:
      - "6380:6379" # 호스트의 6380 포트 매핑
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kdt-backend
    env_file:
      - .env
    environment:
      # compose 네트워크에서는 실제 계정계 서비스로 붙는다(.env 기본값 mock 오버라이드).
      FINANCIAL_CLIENT: http
      MOCK_FINANCIAL_SERVICE_URL: http://mock-financial-service:8002
    ports:
      - "8000:8000"
    networks:
      default:
        aliases:
          - backend-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      redis_stream:
        condition: service_healthy
      mock-financial-service:
        condition: service_started

  agent:
    profiles: [ "agent" ]
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: kdt-agent
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      default:
        aliases:
          - agent-service
    depends_on:
      backend:
        condition: service_started
      redis_cache:
        condition: service_healthy
      redis_stream:
        condition: service_healthy

  mock-financial-service:
    build:
      context: .
      dockerfile: mock-financial-service/Dockerfile
    container_name: kdt-mock-financial-service
    ports:
      - "8002:8002"
    networks:
      default:
        aliases:
          # backend가 참조하는 MOCK_FINANCIAL_SERVICE_URL 호스트와 일치해야 한다.
          - mock-financial-service

  nginx:
    image: nginx:1.27-alpine
    container_name: kdt-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres-data:
