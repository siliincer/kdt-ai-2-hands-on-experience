services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    restart: unless-stopped

  agent:
    restart: unless-stopped

  nginx:
    depends_on:
      - backend
      - agent
    ports:
      - "80:80"
    volumes:
      - ./nginx/ec2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    restart: unless-stopped
