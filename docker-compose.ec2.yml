services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for EC2}
    restart: unless-stopped

  redis_cache:
    restart: unless-stopped

  redis_stream:
    restart: unless-stopped

  backend:
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:?COMPOSE_DATABASE_URL is required for EC2}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required for EC2}
      AGENT_WEBHOOK_SECRET: ${AGENT_WEBHOOK_SECRET:?AGENT_WEBHOOK_SECRET is required for EC2}
      AGENT_SERVICE_TOKEN: ${AGENT_SERVICE_TOKEN:?AGENT_SERVICE_TOKEN is required for EC2}
    restart: unless-stopped

  agent:
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:?OLLAMA_BASE_URL is required for EC2}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-exaone3.5:2.4b}
      AGENT_SERVICE_TOKEN: ${AGENT_SERVICE_TOKEN:?AGENT_SERVICE_TOKEN is required for EC2}
      BACKEND_SERVICE_TOKEN: ${BACKEND_SERVICE_TOKEN:?BACKEND_SERVICE_TOKEN is required for EC2}
    restart: unless-stopped

  mock-financial-service:
    restart: unless-stopped

  nginx:
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/ec2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    restart: unless-stopped
