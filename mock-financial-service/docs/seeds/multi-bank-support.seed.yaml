goal: >
  mock-financial-service에 고정 은행 카탈로그 기반 다은행 지원을 추가한다.
  계좌 생성 시 은행을 지정할 수 있게 하고, 타행 송금 거절(BANK_NOT_SUPPORTED)
  로직을 카탈로그 검증으로 교체해 카탈로그 내 타행간 송금도 가능하게 한다.
  기존과 동일하게 같은 DB 트랜잭션 안에서 즉시 atomic 정산되며, 은행간
  청산/지연 정산(비동기)은 도입하지 않는다.

constraints:
  - 은행 목록은 고정 카탈로그(문자열 상수 집합)이며 자유입력을 허용하지 않는다
  - 기존 BANK_NAME("KDT은행")을 카탈로그의 기본값으로 유지 — 계좌 생성 시 bank_name을
    생략하면 기존과 동일하게 KDT은행으로 생성된다(하위호환)
  - account_number는 은행별이 아니라 DB 전체 기준으로 unique한 상태를 그대로 유지한다
    (현실적으로는 은행별 unique가 맞지만, 이번 스코프에서는 바꾸지 않고 "고민거리"로만
    문서에 남긴다)
  - 송금 정산은 기존과 동일하게 하나의 DB 트랜잭션 안에서 원자적으로 완료되어야 하며,
    비동기 청산/지연 정산 개념을 도입하지 않는다
  - hold(출금보류)/available_balance 분리, 거래 상호명(title), 거래 카테고리는 이번
    스코프에 포함하지 않는다 — 기존 backend TODO(계정계) 주석을 그대로 유지한다
  - 상호명·카테고리는 향후에도 mock seed 데이터로만 채워질 뿐, 사용자 입력이나 자동
    추론 등 실제 기능으로 구현하지 않는다 — 이 사실을 PR/문서에 "고민거리"로 명시한다
  - 한도·수수료 정책(policy_constants.py의 TODO(계정계))도 이번 스코프에서 구현하지
    않는다. 다만 "계정계에 한도·수수료 정책을 실제로 반영할 필요가 있는지"를 별도
    고민거리 항목으로 문서에 명시적으로 남긴다(account_number 전체-unique 유지,
    상호명/카테고리 mock-only와 동급의 오픈 이슈로 취급)
  - DB 스키마 변경이 필요하면 팀 컨벤션대로 alembic revision --autogenerate로 마이그레이션을
    생성한다(Base.metadata.create_all에 의존하지 않는다)
  - 기존 pytest 스위트, ruff, pyright가 전부 그린 상태를 유지해야 한다
  - backend(FastAPI gateway, /Users/nyongd/Documents/GitHub/kdt-ai-2-hands-on-experience/backend)
    코드는 이번 스코프에서 수정하지 않는다 — 변경 범위는 mock-financial-service로 한정한다.
    backend가 이 신규 다은행 API를 실제로 사용하도록 전환하는 작업은 별도 후속 스코프다

acceptance_criteria:
  - "AC: 계좌 생성 시 은행을 지정할 수 있고, 생략하면 기존처럼 KDT은행으로 생성되어 하위호환이 깨지지 않는다 | verify: cd mock-financial-service && uv run pytest tests/test_multi_bank.py -k create -q | artifacts: mock-financial-service/src/financial_service/routers.py, mock-financial-service/src/financial_service/schemas.py, mock-financial-service/src/financial_service/models.py | expect: NONE"
  - "AC: 카탈로그 기반 송금 검증이 정확하다 — 카탈로그 내 다른 은행 소속 계좌간 송금은 성공(더 이상 BANK_NOT_SUPPORTED로 거절되지 않음)하고, 카탈로그에 없는 은행명은 여전히 명확한 에러 코드로 거절된다 | verify: cd mock-financial-service && uv run pytest tests/test_multi_bank.py -k \"transfer_success or unsupported_bank\" -q | artifacts: mock-financial-service/src/financial_service/crud.py | expect: NONE"
  - "AC: 계좌 조회·잔액·원장 등 계정계/정보계 기존 API 응답에 각 계좌의 bank_name이 정확히 반영된다 | verify: cd mock-financial-service && uv run pytest tests/test_multi_bank.py -k bank_name_in_response -q | artifacts: NONE | expect: NONE"
  - "AC: mock-financial-service 문서에 이번 다은행 스코프, 미구현 4건(hold/한도수수료정책/상호명/카테고리), 고민거리(계좌번호 전체-unique 유지, 한도수수료정책 반영 필요성)가 명시적으로 기록된다 | verify: NONE | artifacts: mock-financial-service/docs/todo-account-system-resolution.md, mock-financial-service/docs/api-reference.md | expect: NONE"
  - "AC: 기존 테스트 스위트와 신규 다은행 테스트가 전부 통과하고 lint/타입체크가 클린하다 | verify: cd mock-financial-service && uv run pytest -q && uv run ruff check . && uv run pyright src tests | artifacts: NONE | expect: NONE"

ontology_schema:
  name: MultiBankTransfer
  description: mock-financial-service의 계좌·송금 도메인에 은행 소속(카탈로그) 개념을 추가한 확장 모델
  fields:
    - name: bank_catalog
      type: array
      description: 지원 가능한 고정 은행명 목록(문자열 상수 집합). 기본값으로 기존 "KDT은행" 포함
    - name: account.bank_name
      type: string
      description: 계좌가 속한 은행명. bank_catalog 중 하나여야 하며, 생성 시 지정 가능(생략 시 기본값 KDT은행)
    - name: account.account_number
      type: string
      description: 계좌번호. DB 전체 기준 unique 유지(은행별 unique 아님 — 문서화된 의도적 단순화)
    - name: transfer.receiver_bank_name
      type: string
      description: 송금 대상 은행명. bank_catalog 기준으로 검증(기존 단일 BANK_NAME 하드코딩 비교를 대체)
    - name: transfer.settlement_mode
      type: string
      description: 항상 "atomic_same_transaction" 고정값 — 은행이 달라도 청산/지연 정산을 도입하지 않음을 표현

evaluation_principles:
  - name: backward_compatibility
    description: >-
      기존 단일은행(KDT은행) 계좌·테스트·API 계약이 변경 없이 그대로 동작한다 —
      AC1(생성 시 은행 생략하면 KDT은행 기본값)로 검증
    weight: 1.0
  - name: correctness
    description: 카탈로그 기반 검증이 허용/거절 대상을 정확히 가른다(카탈로그 내=허용, 카탈로그 밖=거절)
    weight: 1.0
  - name: simplicity
    description: 정산 로직은 기존 atomic 방식을 그대로 유지하고 청산·비동기 정산 복잡도를 도입하지 않는다
    weight: 0.8
  - name: documentation_honesty
    description: 구현하지 않은 4건(hold/한도수수료정책/상호명/카테고리)과 고민거리 항목들이 코드가 아니라 문서에 명확히 남아있다
    weight: 0.7

exit_conditions:
  - name: all_criteria_met
    description: 모든 acceptance_criteria가 충족된다
    criteria: acceptance_criteria 100% 충족
  - name: tests_green
    description: 전체 테스트 스위트와 정적 검사가 통과한다
    criteria: pytest, ruff check, pyright 전부 clean
  - name: docs_synced
    description: 문서에 이번 스코프와 보류·고민거리 항목이 리스트업되어 있다
    criteria: docs 파일에 다은행 스코프 및 보류 4건 + 고민거리 항목이 명시적으로 기록됨

metadata:
  ambiguity_score: 0.1
  project_type: brownfield
  context_references:
    - path: mock-financial-service/src/financial_service/models.py
      role: primary
      summary: Account.bank_name 컬럼, BANK_NAME 상수, account_number unique 제약이 정의된 곳
    - path: mock-financial-service/src/financial_service/crud.py
      role: primary
      summary: transfer()의 BANK_NOT_SUPPORTED 검증 로직, get_account_by_number 등 계좌 조회 헬퍼
    - path: mock-financial-service/src/financial_service/routers.py
      role: primary
      summary: POST /accounts, POST /transfers 등 계정계(인증 없음) 엔드포인트
    - path: mock-financial-service/src/financial_service/schemas.py
      role: primary
      summary: AccountCreate/AccountResponse/TransferRequest 등 요청·응답 스키마
    - path: mock-financial-service/docs/todo-account-system-resolution.md
      role: reference
      summary: 이번 작업 이전에 진행된 TODO(계정계) 12건 조사·보류 6건 배경 기록
    - path: backend/src/backend/services/agent_tools/bank_resolver.py
      role: reference
      summary: "원래 TODO(계정계, D6) 원문 위치(backend 쪽 계좌-은행 매핑 fallback, 이번 스코프 아님)"
    - path: backend/src/backend/services/agent_tools/policy_constants.py
      role: reference
      summary: 한도·수수료·hold 정책 TODO 원문 위치(6번 줄). 이번엔 미구현, 고민거리로만 기록
    - path: backend/src/backend/services/agent_tools/balance_reader.py
      role: reference
      summary: hold(출금보류) TODO 원문 위치(7번 줄). 이번 스코프 아님
    - path: backend/src/backend/services/agent_tools/transaction_service.py
      role: reference
      summary: 거래 상호명·카테고리 TODO 원문 위치(145-146번 줄). mock-data-only로 유지
  existing_patterns:
    - 계정계 엔드포인트는 인증 없음, 정보계(analytics_router)는 X-Analytics-Key 헤더 필수
    - DB 스키마 변경은 alembic revision --autogenerate로 생성하는 팀 컨벤션
    - 에러는 {error_code, message} 고정 스키마, throw_err() 헬퍼로 발생시킴
    - 송금은 Idempotency-Key 헤더 + idempotency_key unique 컬럼 + payload_hash 대조로 멱등성 보장
    - pytest는 in-memory SQLite(StaticPool) + conftest.py의 client fixture 사용
  existing_dependencies:
    - FastAPI
    - SQLAlchemy ORM
    - Alembic
    - pytest
    - ruff
    - pyright
    - uv
