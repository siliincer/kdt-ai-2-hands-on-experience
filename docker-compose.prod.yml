# TODO: docker-compose.yml 파일이 프로덕션용 업데이트하는 파일이라
# 생각하고 여기다 최종본 작성해서 docker compose로 클라우드로 배포해주세용
services:
  backend:
    image: ${BACKEND_IMAGE:-kdt-backend:latest}
    container_name: kdt-prod-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: kdt-prod-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
