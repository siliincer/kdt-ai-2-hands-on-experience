# Deprecated compatibility override. Use with docker-compose.yml only.
# The canonical EC2 demo path is docker-compose.yml + docker-compose.ec2.yml.
services:
  backend:
    environment:
      APP_ENV: prod

  nginx:
    volumes:
      - ./nginx/ec2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/frontend-health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
