# Grafana datasource 자동 등록(프로비저닝).
# 근거: https://github.com/grafana/tempo/blob/main/example/docker-compose/single-binary/grafana-datasources.yaml
#
# Grafana 컨테이너는 compose 네트워크 안에 있으므로 서비스명으로 접근한다.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    basicAuth: false
    isDefault: false
    version: 1
    editable: false
    jsonData:
      httpMethod: GET

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    basicAuth: false
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod: GET
      # serviceMap 은 Tempo metrics_generator 가 켜져야 동작하므로 Phase 1 에서는 생략.
