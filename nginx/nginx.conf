# 준수님께: 다음 포맷 참고해주세용 특히 location /backendApi/ 이 부분
upstream fastapi_backend {
    server fastapi:8000; # 127.0.0.1 대신 도커 컴포즈 서비스명 fastapi 사용
}

upstream prometheus_backend {
    server prometheus:9090;
}

upstream grafana_backend {
    server grafana:3000;
}

# http 블록 안에 추가
# zone 이름은 api_limit, 10MB 메모리 사용, key는 클라이언트 IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

server {
    listen 443 ssl;
    http2 on;
    server_name <서버 도메인 이름>;

    ssl_certificate /etc/letsencrypt/live/<서버 도메인 이름>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<서버 도메인 이름>/privkey.pem;

    # Frontend Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 일반 요청 제한 (예: 초당 30회)
        limit_req zone=general_limit burst=20 nodelay;
    }

    # Backend API Proxy
    # 저는 이름을 /backendApi로 fetch로 proxy rewrite해서 보내기로 했습니다.

    # Backend API & SSE Proxy 통합 블록
    location /backendApi/ {
        # 1. /backendApi/를 도려내고 백엔드(/)로 전달합니다. (FastAPI에는 /api/v1/... 으로 도달)
        proxy_pass http://fastapi_backend/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 2. SSE 전용 헤더 설정 (일반 API 요청에 이 헤더들이 들어가도 아무런 문제가 없습니다)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 3. 타임아웃 연장 (일반 API와 SSE 모두 안정적으로 유지되도록 넉넉하게 설정)
        # proxy_read_timeout은 패킷 사이의 공백 시간(Idle Time)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # 4. HTTP 1.1 및 커넥션 유지
        # SSE는 본질적으로 HTTP/1.1의
        # Chunked Transfer Encoding(데이터를 쪼개서 계속 보내는 방식)
        # 기술에 기반하여 설계
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 5. API 요청 제한 (초당 10회, burst 5)
        # ⚠️ 만약 SSE 연결 도중 제한에 걸리는 것이 걱정된다면
        # burst 값을 20 이상으로 넉넉하게 주시는 것을 추천합니다.
        limit_req zone=api_limit burst=20 nodelay;
    }


    # prometheus reverse proxy
    location /prometheus/ {
        proxy_pass http://prometheus_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prometheus 요청 제한
        limit_req zone=general_limit burst=10 nodelay;
    }

    # grafana reverse proxy
    location /grafana/ {
        proxy_pass http://grafana_backend;
        # 오류상 /grafana 경로는 그대로 보내기로 했음
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;

        # Grafana 요청 제한
        limit_req zone=general_limit burst=15 nodelay;
    }
}
