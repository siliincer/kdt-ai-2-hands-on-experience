services:
  postgres:
    image: postgres:16-alpine
    container_name: kdt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_agent}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-local}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-financial_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kdt-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kdt-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      default:
        aliases:
          - backend-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  agent:
    profiles: ["agent"]
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: kdt-agent
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      default:
        aliases:
          - agent-service
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: kdt-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres-data:
