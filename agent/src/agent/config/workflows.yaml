wf_global_agent_entry:
  workflow_name: 글로벌 Agent 진입
  workflow_type: global
  example_utterance: 모든 사용자 입력
  description: "모든 사용자 입력을 최초로 수신하고,\nGlobal Guardrail 검사를 거친 뒤 \n안전 정책을 통과한 요청만 \n\
    개별 업무 Workflow로 라우팅한다."
  max_risk_level: R5
  Flowchart: wf_global_agent_entry
  steps:
  - step_order: 1
    step_id: run_global_guardrail
    step_name: 전역 Guardrail 검사
    step_type: guardrail
    task_id: global_guardrail_check
    tool_id: run_guardrail_check
    output_data_key: guardrail_result
    step_risk_level: R5
    ui_type: ''
    step_message: ''
    on_fail_condition: 정책 위반 요청 / Prompt Injection / 실행 불가 요청
    on_success_next_step_id: match_workflow
    on_fail_next_step_id: return_response
    _2: ''
    _3: ''
    _4: ''
    _5: ''
    _6: ''
  - step_order: 2
    step_id: match_workflow
    step_name: Workflow 매칭
    step_type: routing
    task_id: workflow_matching
    tool_id: match_workflow
    output_data_key: ''
    step_risk_level: R1
    ui_type: ''
    step_message: ''
    on_fail_condition: 매칭 가능한 Workflow 없음
    on_success_next_step_id: execute_matched_workflow
    on_fail_next_step_id: return_response
    _2: ''
    _3: ''
    _4: ''
    _5: ''
    _6: ''
  - step_order: 4
    step_id: execute_matched_workflow
    step_name: 매칭된 Workflow 실행
    step_type: subworkflow
    task_id: workflow_execution
    tool_id: ''
    output_data_key: ''
    step_risk_level: R5
    ui_type: ''
    step_message: ''
    on_fail_condition: 개별 Workflow 실행 실패
    on_success_next_step_id: return_response
    on_fail_next_step_id: return_response
    _2: ''
    _3: ''
    _4: ''
    _5: ''
    _6: ''
  - step_order: 5
    step_id: return_response
    step_name: 응답 반환
    step_type: response
    task_id: final_response_generation
    tool_id: ''
    output_data_key: final_response
    step_risk_level: R0
    ui_type: message
    step_message: 요청 처리 결과를 안내합니다.
    on_fail_condition: ''
    on_success_next_step_id: ''
    on_fail_next_step_id: ''
    _2: ''
    _3: ''
    _4: ''
    _5: ''
    _6: ''
  - step_order: 6
    step_id: show_global_blocked
    step_name: 전역 정책 차단 안내
    step_type: response
    task_id: ''
    tool_id: ''
    output_data_key: final_response
    step_risk_level: R5
    ui_type: blocked_message
    step_message: 요청하신 내용은 안전 정책상 처리할 수 없습니다.
    on_fail_condition: ''
    on_success_next_step_id: ''
    on_fail_next_step_id: ''
    _2: ''
    _3: ''
    _4: ''
    _5: ''
    _6: ''
  - step_order: 7
    step_id: show_no_matching_workflow
    step_name: Workflow 매칭 실패 안내
    step_type: response
    task_id: ''
    tool_id: ''
    output_data_key: final_response
    step_risk_level: R0
    ui_type: message
    step_message: 아직 처리할 수 없는 요청이에요. 잔액 조회, 거래내역 조회, 송금 요청부터 도와드릴 수 있어요.
    on_fail_condition: ''
    on_success_next_step_id: ''
    on_fail_next_step_id: ''
    _2: ''
    _3: ''
    _4: ''
    _5: ''
    _6: ''
  - step_order: 8
    step_id: show_workflow_failed
    step_name: Workflow 실행 실패 안내
    step_type: response
    task_id: ''
    tool_id: ''
    output_data_key: final_response
    step_risk_level: R0
    ui_type: error_message
    step_message: 요청 처리 중 문제가 발생했습니다. 다시 시도해주세요.
    on_fail_condition: ''
    on_success_next_step_id: ''
    on_fail_next_step_id: ''
    _2: ''
    _3: ''
    _4: ''
    _5: ''
    _6: ''
  routes:
  - from_step_id: run_global_guardrail
    route_key: allowed
    route_name: 통과
    condition_description: 전역 Guardrail 검사를 통과한 경우
    to_step_id: match_workflow
  - from_step_id: run_global_guardrail
    route_key: blocked
    route_name: 차단
    condition_description: 정책 위반, Prompt Injection, 실행 불가 요청으로 판단된 경우
    to_step_id: show_global_blocked
  - from_step_id: match_workflow
    route_key: matched
    route_name: 매칭 성공
    condition_description: 사용자 요청에 맞는 Business Workflow가 매칭된 경우
    to_step_id: execute_matched_workflow
  - from_step_id: match_workflow
    route_key: no_match
    route_name: 매칭 실패
    condition_description: 사용자 요청에 맞는 실행 가능한 Workflow가 없는 경우
    to_step_id: show_no_matching_workflow
  - from_step_id: execute_matched_workflow
    route_key: completed
    route_name: 실행 완료
    condition_description: 개별 Workflow가 정상적으로 종료된 경우
    to_step_id: return_response
  - from_step_id: execute_matched_workflow
    route_key: failed
    route_name: 실행 실패
    condition_description: 개별 Workflow 실행 중 예외나 처리 실패가 발생한 경우
    to_step_id: show_workflow_failed
  - from_step_id: show_global_blocked
    route_key: completed
    route_name: 응답 완료
    condition_description: 전역 정책 차단 안내 응답이 생성된 경우
    to_step_id: END
  - from_step_id: show_no_matching_workflow
    route_key: completed
    route_name: 응답 완료
    condition_description: 매칭 실패 안내 응답이 생성된 경우
    to_step_id: END
  - from_step_id: show_workflow_failed
    route_key: completed
    route_name: 응답 완료
    condition_description: Workflow 실행 실패 안내 응답이 생성된 경우
    to_step_id: END
  - from_step_id: return_response
    route_key: completed
    route_name: 응답 완료
    condition_description: 개별 Workflow 결과 응답 반환이 완료된 경우
    to_step_id: END
