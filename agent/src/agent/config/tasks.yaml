global_guardrail_check:
  task_name: 전역 Guardrail 검사
  action_type: guardrail
  risk_level: R5
  description: 사용자 입력이 정책 위반인지 검사한다.
workflow_matching:
  task_name: Workflow 매칭
  action_type: routing
  risk_level: R1
  description: 사용자 입력을 실행 가능한 Workflow 중 하나로 매칭한다.
workflow_execution:
  task_name: Workflow 실행
  action_type: orchestration
  risk_level: R5
  description: 매칭된 Workflow를 로드하고 Step을 실행한다.
final_response_generation:
  task_name: 최종 응답 생성
  action_type: response
  risk_level: R0
  description: 실행 결과를 사용자 응답 형식으로 변환한다.
no_match_handling:
  task_name: 매칭 실패 처리
  action_type: fallback
  risk_level: R0
  description: 실행 가능한 Workflow가 없을 때 안내 응답을 생성한다
balance_inquiry:
  task_name: 잔액 조회
  action_type: inquiry
  risk_level: R1
  description: 본인 계좌의 현재 잔액을 조회한다.
transaction_history_inquiry:
  task_name: 거래 내역 조회
  action_type: search
  risk_level: R1
  description: 기간·카테고리·키워드 기준으로 거래 내역을 조회한다.
spending_analysis:
  task_name: 소비 분석
  action_type: analysis
  risk_level: R2
  description: 거래 내역을 카테고리별로 분석하고 소비 증가 원인을 요약한다.
budget_check:
  task_name: 예산 확인
  action_type: analysis
  risk_level: R2
  description: 잔액과 예정 지출을 기준으로 남은 예산을 계산한다.
deposit_cash:
  task_name: 입금
  action_type: deposit
  risk_level: R3
  description: 외부 또는 가상 자금을 본인 계좌에 입금 처리한다.
withdraw_cash:
  task_name: 출금
  action_type: withdrawal
  risk_level: R4
  description: 본인 계좌에서 현금 또는 외부 출금 처리한다.
internal_transfer:
  task_name: 본인 계좌 이체
  action_type: transfer
  risk_level: R3
  description: 본인 계좌 간 자금을 이동한다.
external_transfer:
  task_name: 타인 송금
  action_type: transfer
  risk_level: R4
  description: 타인 수취인에게 금액을 송금한다.
auto_savings_setup:
  task_name: 자동 저축 설정
  action_type: setting_change
  risk_level: R3
  description: 정해진 조건에 따라 본인 계좌로 반복 저축되도록 설정한다.
recipient_verification:
  task_name: 수취인 확인
  action_type: verification
  risk_level: R2
  description: 사용자가 말한 수취인을 후보 목록과 기존 거래 이력으로 확인한다.
transfer_risk_assessment:
  task_name: 송금 위험도 평가
  action_type: security_check
  risk_level: R3
  description: 금액, 신규 수취인 여부, 빈도 등을 기준으로 송금 위험도를 평가한다.
user_approval:
  task_name: 사용자 승인
  action_type: approval
  risk_level: R3
  description: 실행 전 사용자에게 명시적 승인을 요청한다.
audit_log_recording:
  task_name: Audit Log 기록
  action_type: logging
  risk_level: R1
  description: Workflow, Risk, Tool 호출, 승인, 실행 결과를 기록한다.
